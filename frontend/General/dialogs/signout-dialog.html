<div id="signoutModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="signoutTitle">
    <div class="modal-content">
      <h3 id="signoutTitle">Sign out?</h3>
      <p>Your saved invitations will stay safe in your account. You can return by signing in again.</p>
      <div class="modal-actions">
        <button class="text-button" id="cancelSignoutBtn" type="button">Stay signed in</button>
        <button class="text-button danger" id="confirmSignoutBtn" type="button">Sign out</button>
      </div>
    </div>
  </div>
