<section class="builder template-choice" id="templateChoice" hidden>
    <button class="back-button" type="button" id="backToDetailsButton">← Back to details</button>
    <header class="builder-header">
      <p class="builder-kicker">Choose your card</p>
      <h1>Select a Template</h1>
      <p class="builder-intro">Preview the available versions, then open one fully to save or create a public link.</p>
    </header>
    <div class="template-grid">
      <button class="template-tile" type="button" data-open-template="basic">
        <span class="template-badge">Basic</span>
        <strong>₹149 / month</strong>
        <small>First 10 minutes free after public link generation.</small>
      </button>
      <button class="template-tile premium" type="button" data-open-template="premium">
        <span class="template-badge">Premium</span>
        <strong>₹249 / month</strong>
        <small>First 5 minutes free after public link generation. Includes Google Drive photo gallery.</small>
      </button>
    </div>
  </section>
