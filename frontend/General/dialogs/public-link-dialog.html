<div id="publicLinkModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="publicLinkTitle">
    <div class="modal-content">
      <h3 id="publicLinkTitle">Create public link?</h3>
      <p>Link creation will be allowed once for 10 minutes. For longer duration: <button class="inline-pay-link" id="publicLinkPayNowBtn" type="button">Pay Now</button></p>
      <div class="modal-actions">
        <button class="text-button" id="cancelPublicLinkBtn" type="button">Cancel</button>
        <button class="text-button danger" id="confirmPublicLinkBtn" type="button">Create 10 min link</button>
      </div>
    </div>
  </div>
