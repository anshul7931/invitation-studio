<div id="deleteModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
    <div class="modal-content">
      <h3 id="deleteTitle">Delete invitation?</h3>
      <p>This will permanently delete the card <strong id="deleteCardTitle">this invitation</strong>. This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="text-button" id="cancelDeleteBtn" type="button">Cancel</button>
        <button class="text-button danger" id="confirmDeleteBtn" type="button">Delete</button>
      </div>
    </div>
  </div>
